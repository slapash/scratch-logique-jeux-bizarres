services:
  scratch-logique-jeux-bizarres:
    build: .
    image: scratch-logique-jeux-bizarres:latest
    container_name: scratch-logique-jeux-bizarres
    restart: unless-stopped
    ports:
      - "5180:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
